sonar.projectKey=com.exasol:n8n-nodes
sonar.organization=exasol
sonar.sources=nodes,credentials
sonar.exclusions=dist/**,node_modules/**
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Duplication detection is disabled project-wide: each operation's description.ts declares n8n
# INodeProperties UI config, and structurally similar operations (e.g. Insert/Update's Data Mode
# and Columns fields) legitimately repeat a lot of near-identical declarative shape with only a
# handful of differing strings. Forcing every such pair through a shared parameterized builder
# trades readability for a small reduction in line count, so the team opted to turn the check off
# rather than accumulate that abstraction file by file.
sonar.cpd.exclusions=**/*

# stripLiteralsAndComments() in selectOnlyGuard.ts trips the cognitive complexity threshold (38 vs
# 15 allowed) because it's a single left-to-right state machine over five lexer states (string,
# quoted identifier, line comment, block comment, normal). Its own doc comment explains why that
# has to be one function: splitting per-state handling into separate functions would need to pass
# the shared index cursor and remaining input back and forth, moving the complexity into call/return
# plumbing rather than removing it. Suppressed rather than refactored.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.e1.resourceKey=**/selectOnlyGuard.ts
